name: safe-market-maker-ci

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm audit --audit-level=moderate
